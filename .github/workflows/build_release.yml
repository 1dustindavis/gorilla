name: Build Release

# Trigger on every main branch push
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Get branch & rev
      run: |
        echo "Working Path: ${Env:GITHUB_WORKSPACE}"
        $branchName = $Env:GITHUB_REF -replace 'refs/heads/', ''
        echo "Branch: ${branchName}"
        echo "CURRENT_BRANCH=${branchName}" >> $Env:GITHUB_ENV
        $revision = (git rev-parse HEAD)
        echo "REVISION=${revision}" >> $Env:GITHUB_ENV
    - name: Get go version
      run: |
        $vers=((go version) -replace "go version go", "" -replace " windows/amd64" )
        echo "GO_VERSION=${vers}" >> $Env:GITHUB_ENV

    - name: Create version tag
      id: create_tag
      uses: paulhatch/semantic-version@v5.4.0
      with: 
        tag_prefix: "v"
        major_pattern: "(MAJOR)"
        minor_pattern: "/[\\s]*/"
        version_format: "${major}.${minor}"
        namespace: ''
        bump_each_commit: false

    - name: Build
      working-directory: ./cmd/gorilla
      run: |
        go build -v -ldflags="`
          -X github.com/1dustindavis/gorilla/pkg/version.appName=gorilla`
          -X github.com/1dustindavis/gorilla/pkg/version.version=${{ steps.create_tag.outputs.version_tag }}`
          -X github.com/1dustindavis/gorilla/pkg/version.branch=${{ env.CURRENT_BRANCH }}`
          -X github.com/1dustindavis/gorilla/pkg/version.buildDate=$(Get-Date -format s)`
          -X github.com/1dustindavis/gorilla/pkg/version.revision=${{ env.REVISION }}`
          -X github.com/1dustindavis/gorilla/pkg/version.goVersion=${{ env.GO_VERSION }}"`

    - name: Upload gorilla.exe workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: gorilla-exe-release
        path: ./cmd/gorilla/gorilla.exe
        if-no-files-found: error

    - name: Restore MSIX signing certificate
      env:
        MSIX_CERT_PFX_B64: ${{ secrets.MSIX_CERT_PFX_B64 }}
        MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
      run: |
        New-Item -ItemType Directory -Force -Path build | Out-Null
        if ([string]::IsNullOrWhiteSpace($Env:MSIX_CERT_PFX_B64)) {
          throw "Missing required secret: MSIX_CERT_PFX_B64"
        }
        if ([string]::IsNullOrWhiteSpace($Env:MSIX_CERT_PASSWORD)) {
          throw "Missing required secret: MSIX_CERT_PASSWORD"
        }
        [IO.File]::WriteAllBytes(
          "$Env:GITHUB_WORKSPACE\build\Gorilla.UI.App.SelfSigned.pfx",
          [Convert]::FromBase64String($Env:MSIX_CERT_PFX_B64)
        )

    - name: Build Gorilla UI MSIX
      env:
        MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
      run: |
        dotnet restore gorilla-ui/src/Gorilla.UI.App/Gorilla.UI.App.csproj
        dotnet build gorilla-ui/src/Gorilla.UI.App/Gorilla.UI.App.csproj `
          -c Release `
          -p:Platform=x64 `
          -p:GenerateAppxPackageOnBuild=true `
          -p:PackageCertificateKeyFile="$Env:GITHUB_WORKSPACE\build\Gorilla.UI.App.SelfSigned.pfx" `
          -p:PackageCertificatePassword="$Env:MSIX_CERT_PASSWORD"

    - name: Collect MSIX artifact
      run: |
        $msix = Get-ChildItem -Path gorilla-ui/src/Gorilla.UI.App/AppPackages -Recurse -Filter *.msix |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1
        if ($null -eq $msix) {
          throw "No MSIX package found under gorilla-ui/src/Gorilla.UI.App/AppPackages"
        }
        Copy-Item $msix.FullName "build/Gorilla.UI.App.SelfSigned.msix" -Force

    - name: Upload Gorilla UI MSIX workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: gorilla-ui-msix-selfsigned-release
        path: ./build/Gorilla.UI.App.SelfSigned.msix
        if-no-files-found: error

    - name: Cut release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: false
        prerelease: true
        artifacts: "./cmd/gorilla/gorilla.exe,./build/Gorilla.UI.App.SelfSigned.msix"
        tag: ${{ steps.create_tag.outputs.version_tag }}
        token: ${{ secrets.GITHUB_TOKEN }}
